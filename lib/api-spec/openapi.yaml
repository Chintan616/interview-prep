openapi: "3.0.3"
info:
  title: Interview Prep API
  version: "1.0.0"
  description: AI-powered interview preparation platform API

servers:
  - url: /api

paths:
  /healthz:
    get:
      operationId: getHealth
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string

  /parse-resume:
    post:
      operationId: parseResume
      summary: Parse a PDF resume
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                resume:
                  type: string
                  format: binary
      responses:
        "200":
          description: Parsed resume text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParsedResume"
        "400":
          $ref: "#/components/responses/BadRequest"

  /sessions:
    post:
      operationId: createSession
      summary: Create a new session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionInput"
      responses:
        "201":
          description: Created session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "400":
          $ref: "#/components/responses/BadRequest"

  /sessions/{id}:
    get:
      operationId: getSession
      summary: Get session by ID
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateSession
      summary: Update session fields
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSessionInput"
      responses:
        "200":
          description: Updated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          $ref: "#/components/responses/NotFound"

  /sessions/{id}/analyze:
    post:
      operationId: analyzeSession
      summary: Run AI analysis on session
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Analysis"
        "404":
          $ref: "#/components/responses/NotFound"

  /sessions/{id}/analysis:
    get:
      operationId: getAnalysis
      summary: Get existing analysis for session
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Analysis"
        "404":
          $ref: "#/components/responses/NotFound"

  /sessions/{id}/questions:
    post:
      operationId: generateQuestions
      summary: Generate interview questions for session
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Generated questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Question"
        "404":
          $ref: "#/components/responses/NotFound"
    get:
      operationId: getQuestions
      summary: Get questions for session
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Question"
        "404":
          $ref: "#/components/responses/NotFound"

  /sessions/{id}/questions/{qid}/mark:
    patch:
      operationId: markQuestion
      summary: Toggle is_prepared for a question
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - name: qid
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  parameters:
    SessionId:
      name: id
      in: path
      required: true
      schema:
        type: string

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        details:
          type: object

    ParsedResume:
      type: object
      properties:
        text:
          type: string
        numpages:
          type: integer
        fileName:
          type: string

    Session:
      type: object
      properties:
        id:
          type: string
        targetRole:
          type: string
        experienceYears:
          type: string
        seniority:
          type: string
        jobDescription:
          type: string
        jobPostingUrl:
          type: string
        resumeText:
          type: string
        resumeFileName:
          type: string
        status:
          type: string
          enum: [draft, analyzing, analyzed, generating, ready]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateSessionInput:
      type: object
      required:
        - targetRole
        - jobDescription
      properties:
        targetRole:
          type: string
        experienceYears:
          type: string
        seniority:
          type: string
        jobDescription:
          type: string
        jobPostingUrl:
          type: string
        resumeText:
          type: string
        resumeFileName:
          type: string

    UpdateSessionInput:
      type: object
      properties:
        targetRole:
          type: string
        experienceYears:
          type: string
        seniority:
          type: string
        jobDescription:
          type: string
        jobPostingUrl:
          type: string
        resumeText:
          type: string
        resumeFileName:
          type: string
        status:
          type: string

    Scores:
      type: object
      properties:
        keywordMatch:
          type: integer
        formatting:
          type: integer
        quantifiedImpact:
          type: integer
        roleAlignment:
          type: integer
        senioritSignals:
          type: integer

    BulletOptimization:
      type: object
      properties:
        context:
          type: string
        current:
          type: string
        optimized:
          type: string
        reason:
          type: string
        injectedSignals:
          type: array
          items:
            type: string

    Analysis:
      type: object
      properties:
        id:
          type: string
        sessionId:
          type: string
        atsScore:
          type: integer
        potentialScore:
          type: integer
        scores:
          $ref: "#/components/schemas/Scores"
        matchedSkills:
          type: array
          items:
            type: string
        partialSkills:
          type: array
          items:
            type: string
        missingSkills:
          type: array
          items:
            type: string
        bulletOptimizations:
          type: array
          items:
            $ref: "#/components/schemas/BulletOptimization"
        strategicDirection:
          type: string

    Question:
      type: object
      properties:
        id:
          type: string
        sessionId:
          type: string
        track:
          type: string
        difficulty:
          type: string
        probability:
          type: string
        question:
          type: string
        whyThisQuestion:
          type: string
        suggestedFramework:
          type: string
        talkingPoints:
          type: array
          items:
            type: string
        skillsToMention:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        isPrepared:
          type: boolean
        sortOrder:
          type: integer
